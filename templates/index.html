<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flask Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #2a2a30;
      --accent: #e8c547;
      --accent2: #4de8a0;
      --text: #e8e6df;
      --muted: #6b6b78;
      --done: #3a3a42;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      color: var(--accent);
      letter-spacing: -1px;
      line-height: 1;
    }

    header p {
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 8px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
    }

    .input-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      padding: 14px 16px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: var(--accent);
    }

    .input-row input::placeholder { color: var(--muted); }

    .input-row button {
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      font-size: 0.85rem;
      padding: 14px 20px;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .input-row button:hover { opacity: 0.85; }
    .input-row button:active { transform: scale(0.97); }

    .stats {
      display: flex;
      gap: 24px;
      margin-bottom: 20px;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .stats span { color: var(--accent); }

    #task-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }

    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      transition: border-color 0.2s, opacity 0.3s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item:hover { border-color: #3a3a44; }
    .task-item.done { opacity: 0.45; }

    .check-btn {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--muted);
      background: none;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, background 0.2s;
      font-size: 12px;
      color: transparent;
    }

    .task-item.done .check-btn {
      border-color: var(--accent2);
      background: var(--accent2);
      color: #0d0d0f;
    }

    .task-text {
      flex: 1;
      font-size: 0.88rem;
      line-height: 1.4;
      transition: text-decoration 0.2s;
    }

    .task-item.done .task-text { text-decoration: line-through; }

    .task-meta {
      font-size: 0.68rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .del-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s;
    }

    .del-btn:hover { color: #e85454; }

    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      padding: 40px 0;
      letter-spacing: 2px;
    }

    .empty .icon { font-size: 2rem; display: block; margin-bottom: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>Tasks</h1>
    <p>A simple Flask web app</p>
  </header>

  <div class="container">
    <div class="input-row">
      <input id="task-input" type="text" placeholder="Add a new task..." autocomplete="off"/>
      <button onclick="addTask()">+ Add</button>
    </div>

    <div class="stats" id="stats">
      <div>Total: <span id="total">0</span></div>
      <div>Done: <span id="done-count">0</span></div>
      <div>Pending: <span id="pending">0</span></div>
    </div>

    <ul id="task-list"></ul>
  </div>

  <script>
    async function loadTasks() {
      const res = await fetch('/api/tasks');
      const tasks = await res.json();
      renderTasks(tasks);
    }

    function renderTasks(tasks) {
      const list = document.getElementById('task-list');
      const total = tasks.length;
      const done = tasks.filter(t => t.done).length;
      document.getElementById('total').textContent = total;
      document.getElementById('done-count').textContent = done;
      document.getElementById('pending').textContent = total - done;

      if (!tasks.length) {
        list.innerHTML = '<li class="empty"><span class="icon">✦</span>No tasks yet. Add one above.</li>';
        return;
      }

      list.innerHTML = tasks.map(t => `
        <li class="task-item ${t.done ? 'done' : ''}" id="task-${t.id}">
          <button class="check-btn" onclick="toggleTask(${t.id})">✓</button>
          <span class="task-text">${escapeHtml(t.text)}</span>
          <span class="task-meta">${t.created}</span>
          <button class="del-btn" onclick="deleteTask(${t.id})">✕</button>
        </li>
      `).join('');
    }

    async function addTask() {
      const input = document.getElementById('task-input');
      const text = input.value.trim();
      if (!text) return;
      await fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      input.value = '';
      loadTasks();
    }

    async function toggleTask(id) {
      await fetch(`/api/tasks/${id}`, { method: 'PATCH' });
      loadTasks();
    }

    async function deleteTask(id) {
      await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
      loadTasks();
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    document.getElementById('task-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    loadTasks();
  </script>
</body>
</html>
